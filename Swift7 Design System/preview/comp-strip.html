<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:var(--s7-font);background:var(--s7-green-900);color:var(--s7-ink);padding:26px 30px}
  .lead{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--s7-lime);margin-bottom:16px}
  .search{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.22);border-radius:100px;padding:12px 20px;max-width:420px;box-shadow:0 2px 12px rgba(0,0,0,0.25);margin-bottom:22px}
  .search svg{color:var(--s7-ink-muted);opacity:.5;flex-shrink:0}
  .search-text{font-size:15px;font-weight:500}
  .cursor{display:inline-block;width:2px;height:16px;background:#F0F0EC;margin-left:1px;vertical-align:middle;animation:blink .75s step-end infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .strip{display:inline-flex;align-items:center;gap:24px;background:rgba(255,255,255,.04);border:1px solid var(--s7-border);border-radius:100px;padding:12px 26px}
  .stat{text-align:center}
  .stat .n{font-size:15px;font-weight:700;color:var(--s7-lime)}
  .stat .l{font-size:11px;color:var(--s7-ink-muted);margin-top:2px}
  .sep{width:1px;height:18px;background:var(--s7-border-strong)}
</style>
</head>
<body>
  <p class="lead">Search demo &amp; stat strip</p>
  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <span class="search-text">web designer near me<span class="cursor"></span></span>
  </div>
  <div class="strip">
    <div class="stat"><div class="n">40+</div><div class="l">Sites launched</div></div>
    <div class="sep"></div>
    <div class="stat"><div class="n">7 days</div><div class="l">To live</div></div>
    <div class="sep"></div>
    <div class="stat"><div class="n">5★</div><div class="l">Rated</div></div>
  </div>
</body>
</html>
