<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:var(--s7-font);background:var(--s7-green-900);color:var(--s7-ink);padding:30px;display:flex;gap:24px;align-items:center;justify-content:center}
  .item{text-align:center}
  .box{width:118px;height:72px;background:var(--s7-green-700);border:1px solid var(--s7-border);border-radius:8px}
  .name{font-size:11px;font-weight:700;margin-top:14px}
  .val{font-size:10px;color:var(--s7-ink-muted);margin-top:3px}
</style>
</head>
<body>
  <div class="item"><div class="box" style="box-shadow:0 2px 12px rgba(0,0,0,0.25)"></div><div class="name">Resting</div><div class="val">0 2 12 · .25</div></div>
  <div class="item"><div class="box" style="box-shadow:0 8px 32px rgba(0,0,0,0.30)"></div><div class="name">Hover lift</div><div class="val">0 8 32 · .30</div></div>
  <div class="item"><div class="box" style="box-shadow:0 24px 80px rgba(0,0,0,0.45)"></div><div class="name">Sticky box</div><div class="val">0 24 80 · .45</div></div>
  <div class="item"><div class="box" style="box-shadow:0 4px 20px rgba(37,211,102,0.45);background:#25D366"></div><div class="name">WhatsApp FAB</div><div class="val">green glow</div></div>
</body>
</html>
