<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:var(--s7-font);background:var(--s7-green-900);color:var(--s7-ink);padding:24px 30px;display:flex;align-items:center;gap:34px}
  .lead{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--s7-lime);margin-bottom:8px}
  .tile{width:96px;height:96px;border-radius:22%;background:#0F2219;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
  .tile .seven{font-size:58px;font-weight:900;color:#A8C94A;letter-spacing:-2px;line-height:1}
  .info p{font-size:13px;color:var(--s7-ink-muted);line-height:1.6;max-width:360px}
  .info b{color:var(--s7-ink);font-weight:600}
  .small{width:48px;height:48px;border-radius:22%}
  .small .seven{font-size:28px}
  .group{display:flex;align-items:center;gap:16px}
</style>
</head>
<body>
  <div class="group">
    <div class="tile"><span class="seven">7</span></div>
    <div class="tile small"><span class="seven">7</span></div>
  </div>
  <div class="info">
    <p class="lead">App icon / favicon</p>
    <p>A forest-green <b>#0F2219</b> rounded-square tile (~<b>22%</b> radius) holding the lime <b>"7"</b> in Poppins Black. The "7" is the brand's recurring motif — the name, the icon, the 7-day promise.</p>
  </div>
</body>
</html>
