<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:var(--s7-font);background:var(--s7-green-900);color:var(--s7-ink);padding:26px 30px}
  .lead{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--s7-lime);margin-bottom:18px}
  .row{display:flex;gap:30px;align-items:center}
  .demo{flex:1}
  .reveal{display:inline-block;font-weight:900;font-size:24px;letter-spacing:-1px;animation:rise 2.6s var(--s7-ease) infinite}
  @keyframes rise{0%,12%{opacity:0;transform:translateY(20px)}40%,80%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(0)}}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--s7-lime);display:inline-block;animation:pulse 2.5s infinite;vertical-align:middle;margin-right:8px}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
  .cap{font-size:11px;color:var(--s7-ink-muted);margin-top:10px;font-weight:500}
  .pill{display:inline-flex;align-items:center;background:rgba(255,255,255,.06);border:1px solid var(--s7-border-strong);border-radius:100px;padding:9px 16px;font-size:13px;font-weight:600}
</style>
</head>
<body>
  <p class="lead">Motion — one easing, calm reveals</p>
  <div class="row">
    <div class="demo">
      <div class="reveal">fade-in-up</div>
      <div class="cap">0.65s · cubic-bezier(0.22, 1, 0.36, 1) · staggered, runs once</div>
    </div>
    <div class="demo">
      <div class="pill"><span class="dot"></span>Pulse — eyebrow &amp; "spots left"</div>
      <div class="cap">2.5s loop · scale + opacity · the only ambient motion</div>
    </div>
  </div>
</body>
</html>
