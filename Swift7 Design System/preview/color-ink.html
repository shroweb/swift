<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:var(--s7-font);background:var(--s7-green-900);color:var(--s7-ink);padding:26px 30px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .sw{border-radius:var(--s7-radius);overflow:hidden;border:1px solid var(--s7-border)}
  .chip{height:52px}
  .meta{padding:9px 11px;background:rgba(0,0,0,0.18)}
  .name{font-size:11.5px;font-weight:700;letter-spacing:-0.2px}
  .hex{font-size:10.5px;font-weight:500;color:var(--s7-ink-muted);margin-top:2px;font-variant-numeric:tabular-nums}
  .lead{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--s7-lime);margin-bottom:16px}
</style>
</head>
<body>
  <p class="lead">Ink &amp; functional colours</p>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#F0F0EC"></div><div class="meta"><div class="name" style="color:#0F2219">Ink · text</div><div class="hex">#F0F0EC</div></div></div>
    <div class="sw"><div class="chip" style="background:#C8DACC"></div><div class="meta"><div class="name" style="color:#0F2219">Ink Muted</div><div class="hex">#C8DACC</div></div></div>
    <div class="sw"><div class="chip" style="background:rgba(255,255,255,0.10)"></div><div class="meta"><div class="name">Border</div><div class="hex">#fff · 10%</div></div></div>
    <div class="sw"><div class="chip" style="background:#25D366"></div><div class="meta"><div class="name" style="color:#0F2219">WhatsApp</div><div class="hex">#25D366</div></div></div>
    <div class="sw"><div class="chip" style="background:#4ADE80"></div><div class="meta"><div class="name" style="color:#0F2219">Online dot</div><div class="hex">#4ADE80</div></div></div>
    <div class="sw"><div class="chip" style="background:#C0392B"></div><div class="meta"><div class="name">Error</div><div class="hex">#C0392B</div></div></div>
  </div>
</body>
</html>
