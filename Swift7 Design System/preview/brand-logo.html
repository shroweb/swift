<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:var(--s7-font);background:var(--s7-green-900);color:var(--s7-ink);padding:26px 30px}
  .lead{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--s7-lime);margin-bottom:18px}
  .row{display:flex;gap:18px;align-items:stretch}
  .panel{flex:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:24px;border:1px solid var(--s7-border)}
  .panel img{height:34px;width:auto}
  .wordmark{font-size:30px;font-weight:900;letter-spacing:-1.5px;color:#0F2219}
  .wordmark .seven{color:#A8C94A}
  .cap{font-size:10.5px;font-weight:600;color:var(--s7-ink-muted)}
  .capdark{color:rgba(15,34,25,0.6)}
</style>
</head>
<body>
  <p class="lead">Logo — wordmark, "7" in lime</p>
  <div class="row">
    <div class="panel" style="background:#0F2219"><img src="../assets/logo.png" alt="Swift7"><div class="cap">On dark · white wordmark</div></div>
    <div class="panel" style="background:#F0F0EC"><div class="wordmark">Swift<span class="seven">7</span></div><div class="cap capdark">On light · text lockup</div></div>
    <div class="panel" style="background:#A8C94A"><div class="wordmark" style="color:#0F2219">Swift<span style="color:#0F2219">7</span></div><div class="cap capdark">On lime · all forest</div></div>
  </div>
</body>
</html>
