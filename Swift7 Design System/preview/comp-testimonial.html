<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:var(--s7-font);background:#2A5040;color:var(--s7-ink);padding:24px 30px;display:flex;justify-content:center}
  .card{background:#2A5040;border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:30px;width:380px;position:relative;overflow:hidden}
  .card::before{content:'\201C';position:absolute;top:-12px;right:18px;font-size:120px;font-weight:900;color:rgba(168,201,74,0.08);line-height:1;font-family:Georgia,serif}
  .stars{color:#A8C94A;font-size:14px;letter-spacing:3px;margin-bottom:16px}
  .quote{font-size:15px;line-height:1.7;font-style:italic;color:var(--s7-ink);margin-bottom:22px}
  .author{display:flex;align-items:center;gap:12px;padding-top:18px;border-top:1px solid var(--s7-border)}
  .avatar{width:38px;height:38px;border-radius:50%;background:#0F2219;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
  .name{font-size:14px;font-weight:700;letter-spacing:-0.2px}
  .biz{font-size:12px;color:var(--s7-ink-muted);margin-top:2px}
</style>
</head>
<body>
  <div class="card">
    <div class="stars">★★★★★</div>
    <div class="quote">"Thought the 7 days thing was a gimmick. Callum had it done in 6. Had a couple of people get in touch through the site not long after it went live."</div>
    <div class="author">
      <div class="avatar">SD</div>
      <div><div class="name">Steve D.</div><div class="biz">Roofing &amp; Exteriors</div></div>
    </div>
  </div>
</body>
</html>
