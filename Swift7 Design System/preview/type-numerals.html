<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:var(--s7-font);background:var(--s7-green-950);color:var(--s7-ink);padding:26px 30px;display:flex;align-items:center;gap:40px}
  .lead{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--s7-lime);margin-bottom:10px}
  .stat{font-weight:900;letter-spacing:-3px;line-height:1;color:var(--s7-lime)}
  .s1{font-size:64px}
  .s2{font-size:64px}
  .lbl{font-size:12px;color:var(--s7-ink-muted);font-weight:500;margin-top:6px}
  .col{text-align:left}
  .price{font-weight:900;letter-spacing:-2px;color:var(--s7-ink);font-size:60px}
  .price sup{font-size:26px;vertical-align:super;font-weight:700}
</style>
</head>
<body>
  <div class="col">
    <div class="lead">Stat numerals</div>
    <div class="stat s1">7</div>
    <div class="lbl">Days to live</div>
  </div>
  <div class="col">
    <div class="lead">Big metric</div>
    <div class="stat s2">5★</div>
    <div class="lbl">Google reviews</div>
  </div>
  <div class="col">
    <div class="lead">Price display</div>
    <div class="price"><sup>£</sup>500</div>
    <div class="lbl">All-in. No hidden fees.</div>
  </div>
</body>
</html>
