<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:var(--s7-font);background:var(--s7-green-900);color:var(--s7-ink);padding:28px 30px}
  .lead{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--s7-lime);margin-bottom:18px}
  .big{font-weight:900;font-size:60px;line-height:0.95;letter-spacing:-3px}
  .big .a{color:var(--s7-lime)}
  .spec{font-size:11px;color:var(--s7-ink-muted);margin-top:16px;font-weight:500}
</style>
</head>
<body>
  <p class="lead">Display · Poppins Black</p>
  <div class="big">Live in <span class="a">7</span> days.<br>That's the deal.</div>
  <p class="spec">Poppins 900 · clamp(54–88px) · line-height 1.0 · letter-spacing −3px</p>
</body>
</html>
