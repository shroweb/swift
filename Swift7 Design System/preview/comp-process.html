<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:var(--s7-font);background:var(--s7-green-900);color:var(--s7-ink);padding:24px 30px}
  .lead{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--s7-lime);margin-bottom:14px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--s7-border)}
  .step{padding:22px 22px 8px;border-right:1px solid var(--s7-border);position:relative}
  .step:last-child{border-right:none}
  .step:not(:last-child)::after{content:'→';position:absolute;right:-9px;top:34px;font-size:15px;color:#A8C94A;opacity:.5;font-weight:700}
  .day{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:#A8C94A;background:rgba(168,201,74,0.10);padding:3px 8px;border-radius:2px;margin-bottom:14px;border:1px solid rgba(168,201,74,0.25)}
  .num{font-size:56px;font-weight:900;letter-spacing:-4px;color:#A8C94A;line-height:1;margin-bottom:12px}
  h3{font-size:15px;font-weight:700;letter-spacing:-0.3px;margin-bottom:6px}
  p{font-size:12.5px;color:var(--s7-ink-muted);line-height:1.55}
</style>
</head>
<body>
  <p class="lead">Process step</p>
  <div class="grid">
    <div class="step"><span class="day">Day 1</span><div class="num">01</div><h3>The brief</h3><p>You answer a few questions about the business.</p></div>
    <div class="step"><span class="day">Days 2–5</span><div class="num">02</div><h3>We build</h3><p>Design, copy and SEO, done for you.</p></div>
    <div class="step"><span class="day">Day 7</span><div class="num">03</div><h3>Go live</h3><p>You review, we launch. On schedule.</p></div>
  </div>
</body>
</html>
