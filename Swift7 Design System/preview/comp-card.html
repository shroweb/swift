<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:var(--s7-font);background:var(--s7-green-900);color:var(--s7-ink);padding:24px 30px;display:flex;justify-content:center}
  .card{background:#0F2219;color:#fff;border-radius:4px;padding:28px;border-top:3px solid #A8C94A;width:340px;box-shadow:0 24px 80px rgba(0,0,0,0.45)}
  .label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(240,240,236,0.88);margin-bottom:18px}
  .price{font-size:60px;font-weight:900;letter-spacing:-3px;line-height:1}
  .price sup{font-size:28px;vertical-align:super;font-weight:700}
  .note{font-size:13px;color:rgba(240,240,236,0.88);margin:4px 0 22px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.1)}
  .check{display:flex;align-items:center;gap:10px;font-size:14px;color:rgba(240,240,236,0.88);margin-bottom:11px}
  .ic{width:18px;height:18px;border-radius:50%;background:#234432;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700;flex-shrink:0}
</style>
</head>
<body>
  <div class="card">
    <div class="label">The Swift7 Launch</div>
    <div class="price"><sup>£</sup>500</div>
    <div class="note">All-in. Live in 7 days.</div>
    <div class="check"><span class="ic">✓</span>Up to 10 pages, written for you</div>
    <div class="check"><span class="ic">✓</span>On-page SEO + Google Business Profile</div>
    <div class="check"><span class="ic">✓</span>Domain, hosting &amp; SSL · year one</div>
  </div>
</body>
</html>
