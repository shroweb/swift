<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:var(--s7-font);background:var(--s7-green-900);color:var(--s7-ink);padding:26px 30px}
  .lead{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--s7-lime);margin-bottom:16px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .chip{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#A8C94A;background:rgba(168,201,74,0.10);padding:5px 11px;border-radius:3px}
  .day{font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:#A8C94A;background:rgba(168,201,74,0.10);padding:4px 9px;border-radius:2px;border:1px solid rgba(168,201,74,0.25)}
  .badge{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#fff;background:#234432;padding:4px 9px;border-radius:2px}
  .rec{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#1A1A1A;background:#A8C94A;padding:4px 9px;border-radius:3px}
  .check{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--s7-ink);font-weight:500;margin-bottom:10px}
  .arrow{color:#A8C94A;font-weight:700}
</style>
</head>
<body>
  <p class="lead">Badges, chips &amp; list markers</p>
  <div class="row">
    <span class="chip">What's Included</span>
    <span class="day">Day 1 · Brief</span>
    <span class="badge">Standard</span>
    <span class="rec">Recommended</span>
  </div>
  <div class="check"><span class="arrow">→</span>A website that ranks on Google works 24/7</div>
  <div class="check"><span class="arrow">→</span>You own your site outright — no lock-in</div>
</body>
</html>
